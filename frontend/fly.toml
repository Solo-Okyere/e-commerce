app = "ecommerce-frontend"

[env]
  NODE_ENV = "production"
  NEXT_PUBLIC_API_URL = "https://ecommerce-backend.fly.dev"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    soft_limit = 100
    hard_limit = 200

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls"]
    port = 443

  [services.tcp_checks]
    interval = "15s"
    timeout = "2s"
    restart_limit = 0
    port = 8080
