services:
  - type: web_service
    name: ecommerce-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    autoDeploy: true
    disk:
      name: ecommerce-db
      mountPath: /data
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/ecommerce.db

  - type: web_service
    name: ecommerce-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: NEXT_PUBLIC_API_URL
        value: https://fosogo-na.onrender.com
