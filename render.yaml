services:
  - type: web
    name: ecommerce-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    autoDeploy: true
    disk:
      name: ecommerce-db
      mountPath: /data
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/ecommerce.db

  - type: web
    name: ecommerce-frontend
    runtime: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: NEXT_PUBLIC_API_URL
        value: ""
      - key: BACKEND_HOSTPORT
        fromService:
          type: web
          name: ecommerce-backend
          property: hostport
