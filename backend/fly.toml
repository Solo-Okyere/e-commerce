app = "ecommerce-backend"

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/ecommerce.db"

[[mounts]]
  source = "ecommerce-db"
  destination = "/data"

[[services]]
  internal_port = 5000
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    soft_limit = 100
    hard_limit = 200

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls"]
    port = 443

  [services.tcp_checks]
    interval = "15s"
    timeout = "2s"
    restart_limit = 0
    port = 5000
